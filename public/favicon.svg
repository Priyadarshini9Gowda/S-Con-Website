<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Dark background -->
  <rect width="64" height="64" rx="12" fill="#0a0a0a"/>
  <!-- Gold top accent line -->
  <rect x="0" y="0" width="64" height="3" rx="1.5" fill="url(#topGold)"/>
  <!-- Buildings / skyline -->
  <g stroke="#D4AF37" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Building 1 (left, short) -->
    <line x1="10" y1="48" x2="10" y2="34"/>
    <line x1="10" y1="34" x2="18" y2="26"/>
    <line x1="18" y1="26" x2="18" y2="48"/>
    <!-- Building 2 (center-left) -->
    <line x1="18" y1="36" x2="26" y2="28"/>
    <line x1="26" y1="28" x2="26" y2="48"/>
    <!-- Building 3 (center, tallest) -->
    <line x1="26" y1="30" x2="36" y2="16"/>
    <line x1="36" y1="16" x2="36" y2="48"/>
    <!-- Building 4 (center-right) -->
    <line x1="36" y1="22" x2="46" y2="28"/>
    <line x1="46" y1="28" x2="46" y2="48"/>
    <!-- Building 5 (right) -->
    <line x1="46" y1="34" x2="54" y2="38"/>
    <line x1="54" y1="38" x2="54" y2="48"/>
    <!-- Ground line -->
    <line x1="7" y1="48" x2="57" y2="48"/>
  </g>
  <!-- Crane arm on tallest building -->
  <g stroke="#FFD700" stroke-width="1.8" stroke-linecap="round">
    <line x1="36" y1="16" x2="36" y2="10"/>
    <line x1="36" y1="10" x2="50" y2="10"/>
    <line x1="50" y1="10" x2="50" y2="18"/>
  </g>
  <defs>
    <linearGradient id="topGold" x1="0" y1="0" x2="64" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="40%" stop-color="#D4AF37"/>
      <stop offset="60%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>
</svg>